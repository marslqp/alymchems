<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlymChems | Alymbek Datka lyceum</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    /* Базовые стили */
    * {margin:0;padding:0;box-sizing:border-box;}
    img { max-width: 100%; height: auto; display: block; }
    body {
        font-family: "Poppins", sans-serif;
        background: radial-gradient(circle at top, #0f172a, #020617);
        color: white;
        overflow-x: hidden;
    }

    /* NAV - Исправленное положение */
    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 50px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .logo { font-weight: 600; font-size: 20px; }

    .nav-right {
        display: flex;
        align-items: center;
        gap: 30px;
    }

    .nav-links {
        display: flex;
        align-items: center;
    }

    .nav-links a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
        transition: 0.3s;
        font-weight: 400;
    }
    .nav-links a:hover { color: #38bdf8; }

    /* Стили для кнопки логина и выпадающего меню */
    .user-menu {
        position: relative;
        display: inline-block;
    }

    .auth-btn {
        padding: 10px 20px;
        background: #2563eb;
        border-radius: 8px;
        color: white;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: 0.3s;
        cursor: pointer;
        border: none;
        display: inline-block;
    }
    .auth-btn:hover { background: #1d4ed8; transform: scale(1.05); }

    .dropdown-content {
        display: none;
        position: absolute;
        right: 0;
        background-color: #1e293b;
        min-width: 120px;
        box-shadow: 0px 8px 16px rgba(0,0,0,0.4);
        border-radius: 8px;
        z-index: 1;
        margin-top: 10px;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .dropdown-content button {
        color: #f87171;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
        background: none;
        border: none;
        width: 100%;
        text-align: left;
        cursor: pointer;
        font-family: inherit;
        transition: 0.2s;
    }
    .dropdown-content button:hover { background-color: rgba(255,255,255,0.05); }

    .show { display: block; }

    /* Остальные стили (Hero, Cards и т.д.) */
    .hero { text-align:center; padding:120px 20px; position:relative; }
    .bubble { position:absolute; border-radius:50%; background:rgba(56,189,248,0.2); animation: float 8s infinite ease-in-out; }
    .bubble:nth-child(1){width:60px;height:60px;left:10%;top:80%;}
    .bubble:nth-child(2){width:100px;height:100px;left:80%;top:70%;animation-delay:2s;}
    .bubble:nth-child(3){width:40px;height:40px;left:50%;top:90%;animation-delay:4s;}
    @keyframes float { 0%{transform:translateY(0);} 50%{transform:translateY(-80px);} 100%{transform:translateY(0);} }
    .hero h1 { font-size:50px; }
    .hero p { color:#94a3b8; margin:15px 0 30px; }
    .btn { padding:15px 30px; background:#2563eb; border:none; border-radius:8px; cursor:pointer; color:white; transition:0.3s; font-size: 16px; margin: 5px; }
    .section { padding:70px 40px; max-width:1200px; margin:auto; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:25px; }
    .card { background:rgba(255,255,255,0.05); padding:25px; border-radius:20px; backdrop-filter:blur(10px); transition:0.4s; cursor:pointer; }
    .card:hover { transform:translateY(-10px); }
    .info { display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:center; margin-top: 50px; }
    .big-label { font-size: 80px; font-weight: 800; text-align: center; letter-spacing: 15px; text-transform: uppercase; margin-bottom: 40px; }
    footer { text-align:center; padding:30px; background:rgba(255,255,255,0.05); }
</style>
</head>

<body>

<nav>
    <div class="logo">AlymChems</div>
    <div class="nav-right">
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#about">About</a>
            <a href="#features">Features</a>
            <a href="#chapters">Learn</a>
        </div>
        <!-- Контейнер для авторизации -->
        <div class="user-menu">
            <a href="login.html" id="auth-display" class="auth-btn">Login</a>
            <div id="logout-menu" class="dropdown-content">
                <button onclick="logout()">Logout</button>
            </div>
        </div>
    </div>
</nav>

<section class="hero">
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    <h1>Local chemistry learning school website</h1>
    <p>Alymbek Datka Lyceum</p>
</section>

<!-- Твои остальные секции (About, Features и т.д.) -->
<section class="section info" id="about">
    <div>
        <h2>About Our School</h2>
        <p>Alymbek Datka Lyceum is one of the leading educational institutions focused on modern science education.</p>
    </div>
    <img src="img_chem.jpg" alt="school" style="max-width: 350px; border-radius:20px;">
</section>

<section class="section" id="chapters">
    <h1 class="big-label">LEARN</h1>
    <div style="text-align:center; margin-bottom:30px;">
        <button class="btn" onclick="showGrade(7)">Grade 7</button>
        <button class="btn" onclick="showGrade(8)">Grade 8</button>
        <button class="btn" onclick="showGrade(9)">Grade 9</button>
    </div>
    <div id="topics" class="cards"></div>
</section>

<script>
// ЛОГИКА АВТОРИЗАЦИИ И ОБРАБОТКИ ВХОДА
document.addEventListener('DOMContentLoaded', function() {
    // 1. ПРОВЕРЯЕМ URL (Уловитель данных из PHP)
    const urlParams = new URLSearchParams(window.location.search);
    const status = urlParams.get('status');
    const userName = urlParams.get('user');

    if ((status === 'login_ok' || status == 'success') && userName) {
        // Очищаем имя от плюсиков (ex+example -> ex example)
        const nameClean = decodeURIComponent(userName).replace(/\+/g, ' ');
        
        // СОХРАНЯЕМ В ПАМЯТЬ БРАУЗЕРА
        localStorage.setItem('currentUser', JSON.stringify({ name: nameClean }));
        
        // Убираем параметры из ссылки, чтобы адрес был чистым
        window.history.replaceState({}, document.title, "indkkk.html");
    }

    // 2. ОТОБРАЖЕНИЕ ИМЕНИ ИЛИ КНОПКИ LOGIN
    const userData = localStorage.getItem('currentUser');
    const authDisplay = document.getElementById('auth-display');
    const logoutMenu = document.getElementById('logout-menu');

    if (userData && authDisplay) {
        const user = JSON.parse(userData);
        if (user && user.name) {
            authDisplay.innerText = user.name;
            authDisplay.href = "#"; // Отключаем переход на страницу логина
            authDisplay.classList.add('active-user'); // Можно добавить стиль, если хочешь

            // Клик по имени открывает меню логаута
            authDisplay.onclick = function(e) {
                e.preventDefault();
                logoutMenu.classList.toggle('show');
            };
        }
    }
});

// ФУНКЦИЯ ВЫХОДА
function logout() {
    localStorage.removeItem('currentUser');
    window.location.href = "indkkk.html"; // Перезагружаем страницу
}

// Закрытие меню при клике в любом другом месте
window.onclick = function(event) {
    if (!event.target.matches('#auth-display')) {
        const dropdowns = document.getElementsByClassName("dropdown-content");
        for (let i = 0; i < dropdowns.length; i++) {
            if (dropdowns[i].classList.contains('show')) {
                dropdowns[i].classList.remove('show');
            }
        }
    }
}

// ДАННЫЕ ДЛЯ КАРТОЧЕК (ТВОЙ КОД)
const data = {
    7: [{name: "Introduction", link: "#"}],
    8: [{name: "Reactions", link: "#"}],
    9: [{name: "Organic", link: "#"}]
};

function showGrade(grade) {
    const container = document.getElementById("topics");
    container.innerHTML = "";
    data[grade].forEach(topic => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<h3>${topic.name}</h3><p>Click to watch</p>`;
        container.appendChild(card);
    });
}
</script>

<footer>
    <p>© 2026 AlymChems | Alymbek Datka School</p>
</footer>

</body>
</html>
