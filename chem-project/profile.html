<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile | AlymChems</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:"Poppins",sans-serif;background:radial-gradient(circle at top,#0f172a,#020617);color:white;min-height:100vh;padding:40px 20px;}
        .back{color:#38bdf8;text-decoration:none;font-weight:600;display:inline-block;margin-bottom:30px;}
        .profile-wrap{max-width:700px;margin:auto;}
        .profile-card{background:rgba(255,255,255,0.05);border-radius:24px;padding:40px;border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(15px);text-align:center;margin-bottom:24px;}
        .avatar-circle{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#38bdf8);display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:800;margin:0 auto 20px;box-shadow:0 0 30px rgba(56,189,248,0.4);}
        .name{font-size:28px;font-weight:800;margin-bottom:6px;}
        .grade-badge{display:inline-block;background:rgba(37,99,235,0.3);border:1px solid #2563eb;padding:5px 18px;border-radius:30px;color:#93c5fd;font-size:14px;margin-bottom:20px;}
        .joined{color:#64748b;font-size:13px;}
        .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
        .stat-box{background:rgba(255,255,255,0.05);border-radius:16px;padding:20px;border:1px solid rgba(255,255,255,0.08);text-align:center;}
        .stat-num{font-size:32px;font-weight:800;color:#38bdf8;}
        .stat-label{font-size:12px;color:#64748b;margin-top:4px;}
        .section-title{font-size:18px;font-weight:700;margin-bottom:16px;color:#94a3b8;}
        .badge-grid{display:flex;flex-wrap:wrap;gap:12px;}
        .badge{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:14px;}
        .badge.earned{border-color:#38bdf8;background:rgba(56,189,248,0.1);color:#38bdf8;}
        .logout-btn{width:100%;padding:14px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:12px;color:#f87171;font-size:16px;font-weight:600;cursor:pointer;transition:0.3s;margin-top:10px;}
        .logout-btn:hover{background:rgba(239,68,68,0.3);}
        .no-login{text-align:center;padding:80px 20px;}
        .no-login h2{font-size:28px;margin-bottom:16px;color:#38bdf8;}
        .no-login a{display:inline-block;padding:12px 30px;background:#2563eb;border-radius:10px;color:white;text-decoration:none;font-weight:600;}
    </style>
</head>
<body>
<div class="profile-wrap">
    <a href="index.html" class="back">← Back to Home</a>
    <div id="profile-content"></div>
</div>
<script>
    function getBadges(score) {
        const all = [
            {icon:"🔬",name:"First Steps",desc:"Earned your first points",req:1},
            {icon:"⚗️",name:"Lab Rat",desc:"Reached 50 points",req:50},
            {icon:"🧪",name:"Chemist",desc:"Reached 100 points",req:100},
            {icon:"🏆",name:"Champion",desc:"Reached 200 points",req:200},
            {icon:"💎",name:"Diamond",desc:"Reached 500 points",req:500},
        ];
        return all.map(b=>({...b, earned: score >= b.req}));
    }

    const userData = localStorage.getItem('currentUser');
    const container = document.getElementById('profile-content');

    if (!userData) {
        container.innerHTML = `<div class="no-login"><h2>Not logged in</h2><p style="color:#64748b;margin-bottom:20px;">Please login to see your profile.</p><a href="login.html">Go to Login</a></div>`;
    } else {
        const user = JSON.parse(userData);
        const initial = user.name ? user.name[0].toUpperCase() : '?';
        const badges = getBadges(user.score || 0);
        const earnedCount = badges.filter(b=>b.earned).length;

        container.innerHTML = `
        <div class="profile-card">
            <div class="avatar-circle">${initial}</div>
            <div class="name">${user.name}</div>
            <div class="grade-badge">Grade ${user.grade}</div><br>
            <div class="joined">Member since ${user.joined || 'Today'}</div>
        </div>

        <div class="stats-row">
            <div class="stat-box"><div class="stat-num">${user.score || 0}</div><div class="stat-label">Total Score</div></div>
            <div class="stat-box"><div class="stat-num">${earnedCount}</div><div class="stat-label">Badges Earned</div></div>
            <div class="stat-box"><div class="stat-num">${user.grade}</div><div class="stat-label">Grade Level</div></div>
        </div>

        <div class="profile-card">
            <div class="section-title">🏅 Achievements</div>
            <div class="badge-grid">
                ${badges.map(b=>`<div class="badge ${b.earned?'earned':''}">${b.icon} <div><b>${b.name}</b><br><span style="font-size:11px;color:#64748b">${b.desc}</span></div></div>`).join('')}
            </div>
        </div>

        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        `;
    }

    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
